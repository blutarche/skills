# install.conf — which top-level domains install.sh links into your agents.
#
# One domain (top-level folder) per line. Only domains listed here are installed;
# anything else in the repo is skipped, so a new non-coding domain (e.g. finance/)
# never leaks into your coding agents until you opt it in by adding it below.
# Lines starting with # and blank lines are ignored.

software-development
workflows
meta
